<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>NDG Hub</title>
    <meta name="description" content="Neurodiversity learning &amp; development consultancy management platform" />
    <meta name="author" content="NDG Hub" />
    <meta name="application-name" content="NDG Hub" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e293b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NDG Hub" />

    <!-- Open Graph -->
    <meta property="og:title" content="NDG Hub" />
    <meta property="og:description" content="Neurodiversity learning &amp; development consultancy management platform" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="NDG Hub" />
    <meta name="twitter:description" content="Neurodiversity L&amp;D consultancy management" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register service worker for PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {
            // Service worker registration failed — app still works normally
          });
        });
      }
    </script>
  </body>
</html>

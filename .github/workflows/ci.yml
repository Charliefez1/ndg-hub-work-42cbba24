name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Check bundle size
        run: |
          MAX_SIZE=512000
          for file in dist/assets/*.js; do
            size=$(wc -c < "$file")
            if [ "$size" -gt "$MAX_SIZE" ]; then
              echo "WARNING: $file is $(($size / 1024))KB (limit: $(($MAX_SIZE / 1024))KB)"
            fi
          done

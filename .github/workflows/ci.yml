name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Type check
        run: bunx tsc --noEmit
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
      - name: Check bundle size
        run: |
          MAX_SIZE=512000
          for file in dist/assets/*.js; do
            size=$(wc -c < "$file")
            if [ "$size" -gt "$MAX_SIZE" ]; then
              echo "WARNING: $file is $(($size / 1024))KB (limit: $(($MAX_SIZE / 1024))KB)"
            fi
          done
